    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f7f4fc;
            overflow-x: hidden;
            user-select: none;
        }
        
        .bg-genius-purple { background-color: #6a2c91; }
        .text-genius-purple { color: #6a2c91; }
        .border-genius-purple { border-color: #6a2c91; }
        
        .bg-genius-yellow { background-color: #fec107; }

        .bg-pastel-pink { background-color: #fff0f5; }

        .bg-pastel-green { background-color: #e8f5e9; }
        
        /* Floating animations */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .floating-element {
            animation: float 6s ease-in-out infinite;
        }
        .floating-delayed {
            animation: float 8s ease-in-out infinite;
            animation-delay: 2s;
        }
        
        /* Pulse animation for kids attention */
        @keyframes gentle-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.04); }
        }
        .kid-pulse {
            animation: gentle-pulse 3s ease-in-out infinite;
        }
